<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <style>
        /* ====== Căn giữa toàn trang ====== */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;   /* căn giữa ngang */
            align-items: center;       /* căn giữa dọc */
            background: #f5f6fa;
            font-family: "Poppins", Arial, sans-serif;
        }

        /* ====== Form box ====== */
        .form-box {
            width: 420px;
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .form-box h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            color: #333;
        }

        /* ====== Input styling ====== */
        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box input {
            width: 90%;
            padding: 14px 45px 14px 15px;
            border-radius: 12px;
            background: #ececec;
            border: none;
            outline: none;
            font-size: 15px;
        }

        .input-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #555;
            font-size: 20px;
        }

        /* ====== Button ====== */
        .btn {
            width: 105%;
            padding: 14px;
            background: #6b8dfb;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        .btn:hover {
            background: #5678e7;
        }

        .back-link {
            text-align: center;
            margin-top: 15px;
        }

        .back-link a {
            color: #5375ff;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        /* Toast */
        #toast {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <div class="form-box">
        <form id="forgotForm">
            <h1>Forgot Password</h1>

            <div class="input-box">
                <input type="text" id="username" placeholder="Username" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input type="password" id="newPassword" placeholder="New Password" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <button type="submit" class="btn">Reset Password</button>

            <div class="back-link">
                <a href="SignUp_LogIn_Form.html">← Back to Login</a>
            </div>
        </form>
    </div>

    <div id="toast"></div>

    <script>
        const API_URL = "http://127.0.0.1:3000";

        function showToast(message, isError = false) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.style.background = isError ? "#f44336" : "#4CAF50";
            toast.style.display = "block";

            setTimeout(() => {
                toast.style.display = "none";
            }, 3000);
        }

        document.getElementById("forgotForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const newPass = document.getElementById("newPassword").value;
            const confirmPass = document.getElementById("confirmPassword").value;

            if (newPass.length < 6)
                return showToast("Password must be at least 6 characters", true);

            if (newPass !== confirmPass)
                return showToast("Passwords do not match", true);

            try {
                const res = await fetch(`${API_URL}/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        username: username,
                        new_password: newPass,
                        confirm_password: confirmPass
                    }),
                    credentials: "include"
                });

                const data = await res.json();

                if (data.status === "success") {
                    showToast(data.message);

                    document.getElementById("forgotForm").reset();

                    setTimeout(() => {
                        window.location.href = "SignUp_LogIn_Form.html";
                    }, 2000);
                } else {
                    showToast(data.message, true);
                }
            } catch {
                showToast("Cannot connect to server", true);
            }
        });
    </script>

</body>
</html>
